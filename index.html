<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3TX - للتحميل من انستا</title>
    <style>
        body {
            background-color: #fdf2f8; 
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(219, 39, 119, 0.15); 
            text-align: center;
            width: 90%;
            max-width: 400px;
            border: 2px solid #fbcfe8;
        }
        h1 {
            color: #db2777; 
            font-size: 3.5rem;
            margin: 0;
        }
        p {
            color: #be185d;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #fbcfe8;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
            text-align: center;
        }
        input:focus {
            border-color: #db2777;
        }
        button {
            width: 100%;
            background-color: #db2777; 
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background-color: #be185d;
        }
        #result {
            margin-top: 20px;
        }
        .download-btn {
            display: block;
            background-color: #10b981; 
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>3TX</h1>
        <p>للتحميل من انستا</p>
        
        <input type="url" id="link" placeholder="الصق الرابط هنا..." required>
        <button id="btn" onclick="startDownload()">تحميل</button>
        
        <div id="result"></div>
    </div>

    <script>
        function startDownload() {
            let link = document.getElementById('link').value;
            let result = document.getElementById('result');
            let btn = document.getElementById('btn');

            if (!link.includes("instagram.com")) {
                result.innerHTML = '<span style="color: red; font-weight: bold;">حط رابط انستا صحيح!</span>';
                return;
            }

            btn.innerText = 'ثواني... ⏳';
            btn.disabled = true;

            setTimeout(() => {
                // استخدمنا سيرفر FastDL لأنه ما محظور وأسرع
                let readyLink = `https://fastdl.app/ar/?url=${encodeURIComponent(link)}`;
                result.innerHTML = `<a href="${readyLink}" target="_blank" class="download-btn">اضغط هنا للتحميل</a>`;
                btn.innerText = 'تحميل مرة ثانية';
                btn.disabled = false;
            }, 1000);
        }
    </script>

</body>
</html>
